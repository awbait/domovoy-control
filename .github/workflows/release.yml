name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod

      - name: Build frontend
        working-directory: frontend
        run: |
          bun install --frozen-lockfile
          bun run build

      - name: Build backend (linux/amd64)
        working-directory: backend
        run: |
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 \
            go build -ldflags="-s -w" -o ../backend-linux .

      - name: Update manifest version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          jq --arg v "$VERSION" '.version = $v' manifest.json > manifest.tmp.json
          mv manifest.tmp.json manifest.json

      - name: Package ZIP
        run: |
          python3 - <<'EOF'
          import zipfile, os

          files = [
              ('manifest.json',        'manifest.json'),
              ('frontend/dist/widget.js', 'widget.js'),
              ('migrations.sql',       'migrations.sql'),
              ('backend-linux',        'backend'),
          ]

          with zipfile.ZipFile('domovoy-control.zip', 'w', zipfile.ZIP_DEFLATED) as z:
              for src, arc in files:
                  if not os.path.exists(src):
                      print(f'  skip {src} (not found)')
                      continue
                  info = zipfile.ZipInfo(arc)
                  if arc == 'backend':
                      info.external_attr = 0o755 << 16
                  with open(src, 'rb') as f:
                      z.writestr(info, f.read())
                  print(f'  + {arc}')

          size = round(os.path.getsize('domovoy-control.zip') / 1024)
          print(f'ZIP ready: {size} KB')
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: domovoy-control.zip
          generate_release_notes: true

      - name: Notify domovoy-modules registry
        env:
          # Add REGISTRY_TOKEN secret in repo settings:
          # GitHub PAT with repo scope for awbait/domovoy-modules
          REGISTRY_TOKEN: ${{ secrets.REGISTRY_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          curl -s -X POST \
            -H "Authorization: Bearer $REGISTRY_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/awbait/domovoy-modules/dispatches \
            -d "{\"event_type\":\"module-released\",\"client_payload\":{\"id\":\"domovoy-control\",\"version\":\"$VERSION\"}}"
